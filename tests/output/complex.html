<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style></style>
</head>
<body>
  <main class="root" data-wm-636f6d data-wm-type="view"><header class="header" data-wm-636f6d data-wm-type="view"><h1 data-wm-636f6d data-wm-type="text">Title: <span data-wm-bind="title">WebMAX Ultimate Test</span></h1><span class="subtitle" data-wm-636f6d data-wm-type="text">Version: <span data-wm-bind="version">0.1</span></span></header><div class="content" data-wm-636f6d data-wm-type="view"><span data-wm-636f6d data-wm-type="text">Экранирование: <>& " '</span><span data-wm-636f6d data-wm-type="text">Missing value: <span data-wm-bind="missing_value">{missing_value}</span></span><div class="card-list" data-wm-636f6d data-wm-type="view"><div class="card" data-wm-636f6d data-wm-type="view"><strong data-wm-636f6d data-wm-type="text">Card 1</strong><button class="btn" data-wm-on-click="alert('OK')" data-wm-636f6d data-wm-type="action"><span data-wm-636f6d data-wm-type="text">Press me!</span></button></div></div></div><footer data-wm-636f6d data-wm-type="view"><span data-wm-636f6d data-wm-type="text">© 2026 WebMAX</span></footer></main>
  <script>
    window.WebMAX = {
  hydrate(componentData) {
    const bindings = {};
    const methods = componentData.methods || {};

    document.querySelectorAll("[data-wm-bind]").forEach((el) => {
      const key = el.getAttribute("data-wm-bind");
      if (!bindings[key]) bindings[key] = [];
      bindings[key].push(el);
    });

    document.addEventListener("click", (e) => {
      const target = e.target.closest("[data-wm-on-click]");
      if (target) {
        const methodName = target.getAttribute("data-wm-on-click");
        if (methods[methodName]) {
          methods[methodName].call(window.state);
        } else {
          new Function(methodName).call(window.state);
        }
      }
    });

    window.state = new Proxy(componentData.data || {}, {
      set(target, key, value) {
        target[key] = value;
        if (bindings[key]) {
          bindings[key].forEach((el) => {
            el.textContent = value;
          });
        }
        return true;
      },
    });

    console.log("WebMAX Hydrated 🚀");

    return state;
  },
};
 
    window.state = WebMAX.hydrate({
      data: {"title":"WebMAX Ultimate Test","version":0.1}
    });
  </script>
</body>
</html>
